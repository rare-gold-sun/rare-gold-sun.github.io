# ==================================================
# Jekyll 配置文件 (_config.yml)
# 适用于 GitHub Pages 用户/项目站点
# 设计原则：明确、安全、符合 Web 标准
# ==================================================

# ── 站点元信息 (Site Metadata) ───────────────────────
title: "Your Informatics Notebook"          # 网站标题（显示在浏览器标签页等）
email: your.email@example.com               # 可选：用于联系（不会自动公开）
description: >-                             # 多行描述，折叠成单行（> 表示保留换行但合并空格）
  A place for exploring computing fundamentals,
  version control, and the intersection of code and information.
baseurl: ""                                 # 项目站点需设为 "/project-name"；用户站点留空 ""
url: "https://yourusername.github.io"       # 完整站点 URL（用户站点）或 "https://yourdomain.com"（自定义域名）

# ── 构建设置 (Build Settings) ────────────────────────
markdown: kramdown                           # GitHub Pages 支持的 Markdown 解析器（唯一选择）
highlighter: rouge                           # 代码高亮引擎（GitHub Pages 强制使用 rouge）
lsi: false                                   # 潜在语义索引（不支持于 GitHub Pages，必须 false）
excerpt_separator: "<!-- more -->"           # 手动控制文章摘要截断点

# ── 路径与包含 (Paths & Includes) ────────────────────
include: ['.htaccess']                       # 显式包含隐藏文件（如需）
exclude:                                     # 构建时排除的文件/目录（节省空间、避免泄露）
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - .gitignore
  - .github/

# ── 插件 (Plugins) ───────────────────────────────────
# ⚠️ GitHub Pages 仅支持以下白名单插件（不可自定义）：
plugins:
  - jekyll-feed                          # 自动生成 RSS 订阅源（推荐）
  - jekyll-sitemap                       # 自动生成 sitemap.xml（利于 SEO）
  - jekyll-seo-tag                       # 自动添加 SEO 元标签（强烈推荐）

# ── 默认 Front Matter (Permalink & Layouts) ─────────
defaults:
  -
    scope:
      path: ""                            # 应用于所有文件
    values:
      layout: "default"                   # 默认模板（需存在 _layouts/default.html）
  -
    scope:
      path: "_posts"                      # 仅应用于 _posts/ 目录
    values:
      layout: "post"                      # 文章用 post 模板

# ── Permalink 格式 (URL 结构) ────────────────────────
permalink: /:year/:month/:day/:title/     # 生成如 /2026/03/13/my-post/ 的路径（语义清晰）

# ── 自定义变量 (Custom Variables) ────────────────────
# 你可在模板中通过 {{ site.my_var }} 调用
author:
  name: "Your Name"
  github: "yourusername"
  bio: "Student of informatics | Exploring code, systems, and history of computing"

# EOF
